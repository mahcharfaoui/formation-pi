server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: catalogue-service
          uri: lb://catalogue-service
          predicates:
            - Path=/api/catalogue/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: formateur-service
          uri: lb://formateur-service
          predicates:
            - Path=/api/formateurs/**

        - id: session-service
          uri: lb://session-service
          predicates:
            - Path=/api/sessions/**

        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quiz/**

        - id: suivi-service
          uri: lb://suivi-service
          predicates:
            - Path=/api/suivi/**

        - id: certification-service
          uri: lb://certification-service
          predicates:
            - Path=/api/certifications/**

        - id: notification-service
          uri: lb://user-service
          predicates:
            - Path=/api/notifications/**

        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: ml-service
          uri: lb://ml-service
          predicates:
            - Path=/api/ml/**

        - id: uploads-service
          uri: lb://catalogue-service
          predicates:
            - Path=/uploads/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/plateforme}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  metrics:
    export:
      prometheus:
        enabled: true
